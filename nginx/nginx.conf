server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 20m;

    auth_basic "Pentest Audit Helper";
    auth_basic_user_file /etc/nginx/.htpasswd;

    # Export Service — /api/export/
    location /api/export/ {
        proxy_pass http://export-service:8002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Export Service — /api/templates/
    location /api/templates {
        proxy_pass http://export-service:8002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # AI Vuln Generator — /api/ai/
    location /api/ai/ {
        proxy_pass http://ai-vuln-generator:8004;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_buffering off;
        proxy_read_timeout 300s;
    }

    # Archive Service — /api/archive/
    location /api/archive/ {
        proxy_pass http://archive:8006;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        client_max_body_size 50m;
    }

    # Report Service — /api/ (catch-all for remaining /api routes)
    location /api/ {
        proxy_pass http://report-service:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
