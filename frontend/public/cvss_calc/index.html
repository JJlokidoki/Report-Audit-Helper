<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CVSS 4.0</title>
  <script>
    // Apply theme before render to avoid flash
    (function() {
      const p = new URLSearchParams(window.location.search);
      if (p.get('theme') === 'light') document.documentElement.setAttribute('data-theme','light');
    })();
  </script>
  <script src="https://unpkg.com/vue@3.2.45/dist/vue.global.prod.js"></script>
  <link rel="icon" href="data:,">
  <style>
    :root {
      --bg:        #1c2030;
      --surface:   #232840;
      --surface2:  #2a3050;
      --border:    #35405a;
      --text:      #d0d8f0;
      --text-dim:  #6878a8;
      --primary:   #47c8d8;
      --primary-bg:#47c8d820;
      --success:   #4ac880;
      --warning:   #f0a020;
      --error:     #e05050;
    }
    [data-theme="light"] {
      --bg:        #f4f6fb;
      --surface:   #eaecf5;
      --surface2:  #dde0ef;
      --border:    #c5cce0;
      --text:      #1a1e30;
      --text-dim:  #6070a0;
      --primary:   #1a80b8;
      --primary-bg:#1a80b818;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "JetBrains Mono", "Consolas", monospace;
      font-size: 12px;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* ── Sticky header ─── */
    #header {
      flex-shrink: 0;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 8px 14px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .score-badge {
      font-size: 11px;
      font-weight: 600;
      padding: 2px 8px;
      border: 1px solid var(--border);
      background: var(--surface2);
      white-space: nowrap;
      flex-shrink: 0;
    }
    .score-badge.sev-none     { color: var(--text-dim); }
    .score-badge.sev-low      { color: var(--success); border-color: color-mix(in srgb, var(--success) 50%, transparent); }
    .score-badge.sev-medium   { color: var(--warning); border-color: color-mix(in srgb, var(--warning) 50%, transparent); }
    .score-badge.sev-high     { color: var(--error);   border-color: color-mix(in srgb, var(--error)   50%, transparent); }
    .score-badge.sev-critical { color: var(--error);   border-color: color-mix(in srgb, var(--error)   50%, transparent); letter-spacing: 0.05em; }

    .vector-display {
      flex: 1;
      font-size: 10px;
      color: var(--text-dim);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .btn-header {
      font-size: 11px;
      padding: 3px 10px;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-dim);
      cursor: pointer;
      flex-shrink: 0;
      font-family: inherit;
    }
    .btn-header:hover { color: var(--text); border-color: var(--text-dim); }
    .btn-lang { letter-spacing: 0.08em; }

    /* ── Scroll body ─── */
    #main {
      flex: 1;
      overflow-y: auto;
      padding: 10px 14px;
    }
    #main::-webkit-scrollbar { width: 5px; }
    #main::-webkit-scrollbar-track { background: var(--bg); }
    #main::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* ── Metric type block ─── */
    .mt-block {
      margin-bottom: 14px;
    }
    .mt-title {
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--primary);
      padding: 5px 0 4px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 6px;
    }

    /* ── Metric group ─── */
    .mg-block {
      margin-bottom: 8px;
    }
    .mg-title {
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 5px;
      padding-left: 2px;
    }

    /* ── Metric row ─── */
    .m-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 4px;
      min-height: 26px;
    }
    .m-name {
      width: 200px;
      flex-shrink: 0;
      text-align: right;
      color: var(--text-dim);
      font-size: 11px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      cursor: default;
    }
    .m-opts { display: flex; gap: 3px; flex-wrap: wrap; }

    /* ── Option buttons ─── */
    .o-btn {
      font-family: inherit;
      font-size: 11px;
      padding: 2px 7px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-dim);
      cursor: pointer;
      transition: background 0.1s, color 0.1s, border-color 0.1s;
      white-space: nowrap;
      line-height: 1.6;
    }
    .o-btn:hover {
      background: var(--surface2);
      color: var(--text);
      border-color: var(--text-dim);
    }
    .o-btn.is-active {
      background: var(--primary-bg);
      color: var(--primary);
      border-color: var(--primary);
    }

    .loading-msg {
      text-align: center;
      color: var(--text-dim);
      padding: 40px 0;
      font-size: 11px;
      letter-spacing: 0.1em;
    }
  </style>
</head>
<body>
  <div id="app">
    <!-- Header -->
    <div id="header">
      <span :class="'score-badge sev-' + severityRating.toLowerCase()">
        {{ score }} &thinsp; {{ severityRating }}
      </span>
      <span class="vector-display" :title="vector">{{ vector }}</span>
      <button class="btn-header btn-lang" @click="toggleLang">{{ lang === 'en' ? 'RU' : 'EN' }}</button>
      <button class="btn-header" @click="onReset">{{ lang === 'ru' ? 'СБРОС' : 'RESET' }}</button>
    </div>

    <!-- Main -->
    <div id="main">
      <div v-if="!cvssConfigData" class="loading-msg">// загрузка метрик...</div>

      <template v-else>
        <div class="mt-block" v-for="(mtData, mtName) in cvssConfigData" :key="mtName">
          <div class="mt-title">{{ mtName }}</div>

          <div class="mg-block" v-for="(mgData, mgName) in mtData.metric_groups" :key="mgName">
            <div class="mg-title">{{ mgName }}</div>

            <div class="m-row" v-for="(mData, mName) in mgData" :key="mName">
              <span class="m-name" :title="mData.tooltip">{{ mName }}</span>
              <div class="m-opts">
                <template v-for="(optData, optName) in mData.options" :key="optName">
                  <button
                    v-if="optName"
                    :class="['o-btn', vectorInstance.metrics[mData.short] == optData.value ? 'is-active' : '']"
                    :title="optData.tooltip"
                    @click="onButton(mData.short, optData.value)"
                  >{{ optName }}</button>
                </template>
              </div>
            </div>

          </div>
        </div>
      </template>
    </div>
  </div>

  <script src="/cvss_calc/cvss40.js"></script>
  <script src="/cvss_calc/app.js"></script>
</body>
</html>
