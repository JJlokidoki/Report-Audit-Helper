services:
  report-service:
    build: services/report-service
    volumes:
      - report-db:/app/data
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./data/report.db
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/api/reports')"]
      interval: 10s
      timeout: 5s
      retries: 3

  export-service:
    build: services/export-service
    environment:
      - REPORT_SERVICE_URL=http://report-service:8001
    depends_on:
      report-service:
        condition: service_healthy

  ai-vuln-generator:
    build: services/ai-vuln-generator
    environment:
      - LLM_PROVIDER=${LLM_PROVIDER:-openai}
      - LLM_MODEL=${LLM_MODEL:-openai/gpt-oss-20b}
      - LLM_BASE_URL=${LLM_BASE_URL:-http://host.docker.internal:1234/v1}
      - LLM_API_KEY=${LLM_API_KEY:-}
      - LLM_AUTH_KEY=${LLM_AUTH_KEY:-}
      - LLM_TEMPERATURE=${LLM_TEMPERATURE:-0.1}
      - LLM_MAX_TOKENS=${LLM_MAX_TOKENS:-2048}

  archive:
    build: services/archive
    volumes:
      - archive-data:/app/data
    environment:
      - EMBEDDING_PROVIDER=${EMBEDDING_PROVIDER:-openai}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-text-embedding-3-small}
      - EMBEDDING_BASE_URL=${EMBEDDING_BASE_URL:-http://host.docker.internal:1234/v1}
      - EMBEDDING_API_KEY=${EMBEDDING_API_KEY:-}
      - EMBEDDING_AUTH_KEY=${EMBEDDING_AUTH_KEY:-}
      - EMBEDDING_DIMENSIONS=${EMBEDDING_DIMENSIONS:-512}
      - REPORT_SERVICE_URL=http://report-service:8001
    depends_on:
      report-service:
        condition: service_healthy

  frontend:
    build: frontend
    volumes:
      - frontend-dist:/output

  nginx:
    build: nginx
    ports:
      - "80:80"
    environment:
      - AUTH_USER=${AUTH_USER:-admin}
      - AUTH_PASSWORD=${AUTH_PASSWORD:-admin}
    volumes:
      - frontend-dist:/usr/share/nginx/html:ro
    depends_on:
      frontend:
        condition: service_completed_successfully
      report-service:
        condition: service_healthy
      export-service:
        condition: service_started
      ai-vuln-generator:
        condition: service_started
      archive:
        condition: service_started

volumes:
  report-db:
  frontend-dist:
  archive-data:
